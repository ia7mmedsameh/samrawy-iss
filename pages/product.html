<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Dynamic titles and SEO tags populated by JS -->
  <title>Produktdetails | ISS SOLUTIONS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="page">
  <div id="page-loader" class="loader-overlay">
    <div class="loader"><div class="loader__spinner"></div></div>
  </div>

  <header id="site-header" class="site-header">
    <div class="header-topbar">
      <div class="container">
        <div class="topbar-contact">
          <a href="mailto:info@iss-solutions.eu">info@iss-solutions.eu</a>
          <a href="tel:+493012345678">+49 30 1234 5678</a>
        </div>
        <div class="lang-switcher">
          <button class="lang-switcher__btn is-active" data-lang="de">DE</button>
          <button class="lang-switcher__btn" data-lang="en">EN</button>
        </div>
      </div>
    </div>
    <div class="header-main">
      <div class="container">
        <a href="../index.html" class="header-logo">
          <div class="header-logo__icon">ISS</div>
          <div class="header-logo__text"><span class="header-logo__name">ISS SOLUTIONS</span></div>
        </a>
        <nav class="header-nav">
          <a href="../index.html" class="nav-link" data-i18n="nav.home">Startseite</a>
          <div class="nav-item">
            <a href="#" class="nav-link"><span data-i18n="nav.company">ISS</span></a>
            <div class="nav-dropdown">
              <a href="./about.html" class="nav-dropdown__link" data-i18n="nav.about">Über uns</a>
              <a href="./chairman.html" class="nav-dropdown__link" data-i18n="nav.chairman">Botschaft des Vorsitzenden</a>
              <a href="./policies.html" class="nav-dropdown__link" data-i18n="nav.policies">Unsere Richtlinien</a>
              <a href="./certifications.html" class="nav-dropdown__link" data-i18n="nav.certifications">Zertifizierungen</a>
              <a href="./hr.html" class="nav-dropdown__link" data-i18n="nav.hr">Personalwesen</a>
            </div>
          </div>
          <a href="./products.html" class="nav-link is-active" data-i18n="nav.products">Produkte</a>
          <a href="./agent.html" class="nav-link" data-i18n="nav.agent">Agent werden</a>
          <a href="./academy.html" class="nav-link" data-i18n="nav.academy">Akademie</a>
          <a href="./blog.html" class="nav-link" data-i18n="nav.blog">Blog</a>
        </nav>
        <div class="header-cta">
          <a href="./contact.html" class="btn btn--primary btn--sm" data-i18n="nav.contact">Kontakt</a>
        </div>
      </div>
    </div>
  </header>

  <main class="page-content">
    <section class="product-detail">
      <div class="container">
        <div class="product-detail__grid">
          
          <!-- Left Column: Gallery -->
          <div class="product-gallery">
            <div class="product-gallery__main">
              <img id="product-main-img" src="" alt="Product Main Image">
            </div>
            <div class="product-gallery__thumbs" id="product-thumbs">
              <!-- Thumbnails injected dynamically -->
            </div>
          </div>

          <!-- Right Column: Info & Specs -->
          <div class="product-info">
            <span class="product-info__category" id="product-category-label">Kategorie</span>
            <h1 class="product-info__title" id="product-title">Produktname</h1>
            <p class="product-info__desc" id="product-desc">Produktbeschreibung</p>

            <div class="tabs">
              <div class="tabs__nav">
                <button class="tabs__btn is-active" data-tab="features" data-i18n="product_detail.features">Eigenschaften</button>
                <button class="tabs__btn" data-tab="specs" data-i18n="product_detail.specifications">Technische Daten</button>
                <button class="tabs__btn" data-tab="downloads" data-i18n="product_detail.downloads">Downloads</button>
              </div>

              <!-- Features tab -->
              <div class="tabs__panel is-active" data-tab-panel="features">
                <div class="product-features" id="product-features-list">
                  <!-- Features injected dynamically -->
                </div>
              </div>

              <!-- Specs tab -->
              <div class="tabs__panel" data-tab-panel="specs">
                <table class="product-specs-table">
                  <tbody id="product-specs-body">
                    <!-- Specifications injected dynamically -->
                  </tbody>
                </table>
              </div>

              <!-- Downloads tab -->
              <div class="tabs__panel" data-tab-panel="downloads">
                <div class="product-downloads" id="product-downloads-list">
                  <!-- Downloads injected dynamically -->
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- Related Products Section -->
    <section class="related-products section">
      <div class="container">
        <h2 class="h3 mb-8" data-i18n="product_detail.related_products">Ähnliche Produkte</h2>
        <div class="grid grid--3" id="related-products-grid">
          <!-- Related products injected dynamically -->
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="site-footer">
    <div class="footer-bottom">
      <div class="container">
        <span class="footer-copyright">&copy; 2026 ISS SOLUTIONS.</span>
      </div>
    </div>
  </footer>

  <script type="module" src="../js/pages/product-detail.js"></script>
</body>
</html>
