      </div>
    </div>
    <div class="header-main">

        <a href="./blog.html" class="btn btn--outline btn--sm mb-8" data-i18n="common.back">Zurück</a>

        <div class="article-detail__header">
          <span class="article-detail__category" id="article-category">Kategorie</span>

        </div>

        <div class="article-detail__body" id="article-body">
          <!-- Injected dynamically -->
        </div>
